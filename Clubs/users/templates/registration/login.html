{% extends "base.html" %}
{% block content %}
    <div class="w-full lg:w-2/3 mx-auto mt-10 mb-10 p-6 border rounded-lg shadow-lg">
            {% if messages %}
                {% for message in messages %}
                <p style="color:red;">{{ message }}</p>
                {% endfor %}
            {% endif %}
            <form method="POST">
            {% csrf_token %}
           {{form.as_p}}
           <button class='bg-red-400 px-4 py-2 rounded-lg mt-2 text-white' type="submit">Sign In</button>
           </form>
    </div>
    {% endblock content %}
