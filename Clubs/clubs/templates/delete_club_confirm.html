{% extends "base.html" %}

{% block content %}
<div class="max-w-lg mx-auto mt-10 p-6 bg-white rounded-xl shadow">

    <h2 class="text-2xl font-bold mb-4 text-red-600">Delete Club</h2>
    <p class="mb-6">
        Are you sure you want to delete <strong>{{ club.name }}</strong>?  
        This action **cannot be undone**.
    </p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="bg-red-500 text-white px-6 py-2 rounded-lg hover:bg-red-600">
            Yes, Delete
        </button>
        <a href="{% url 'club-detail' club.id %}" 
           class="ml-4 text-gray-700 underline">
            Cancel
        </a>
    </form>

</div>
{% endblock %}
