{% extends "base.html" %}

{% block content %}
<h2 class="text-2xl font-semibold mb-4">
    Pending Requests for {{ club.name }}
</h2>

{% if pending %}
    <table class="min-w-full bg-white shadow-lg rounded-lg">
        <thead>
            <tr>
                <th class="px-4 py-2 border">User</th>
                <th class="px-4 py-2 border">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for m in pending %}
            <tr>
                <td class="px-4 py-2 border">{{ m.user.username }}</td>
                <td class="px-4 py-2 border text-center">
                    <a href="{% url 'approve-member' m.id %}"
                       class="bg-green-500 text-white px-3 py-1 rounded mr-2">
                       Approve
                    </a>
                    <a href="{% url 'reject-member' m.id %}"
                       class="bg-red-500 text-white px-3 py-1 rounded">
                       Reject
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% else %}
    <p class="text-gray-600">No pending requests.</p>
{% endif %}
{% endblock %}
