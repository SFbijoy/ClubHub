{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="max-w-lg mx-auto bg-white p-8 mt-10 rounded-2xl shadow-md">
    <h2 class="text-2xl font-semibold text-gray-800 mb-4 text-center">
        Add New Role for {{ club.name }}
    </h2>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        {{ form.non_field_errors }}

        <div>
            <label for="id_role_name" class="block text-gray-700 font-medium mb-2">
                Role Name
            </label>
            {{ form.role_name }}
            {% if form.role_name.errors %}
                <p class="text-red-500 text-sm mt-1">{{ form.role_name.errors.0 }}</p>
            {% endif %}
        </div>

        <div class="flex justify-between items-center">
            <a href="{% url 'club-detail' club.id %}"
               class="text-gray-500 hover:text-gray-700 transition">
               ← Back to {{ club.name }}
            </a>
            <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg transition">
                Add Role
            </button>
        </div>
    </form>
</div>
{% endblock %}
