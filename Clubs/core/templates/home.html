{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="relative flex justify-center mt-5 mb-5">
  <div id="carousel" class="w-2/3 h-[420px] relative rounded-2xl shadow-md border-4 border-gray-300 overflow-hidden">
    
    <!-- Carousel slides -->
    <div class="carousel-images flex transition-transform duration-700 ease-in-out">
      {% for event in events %}
        <a href="{% url 'event-detail' event.id %}" class="w-full h-[420px] flex-shrink-0 block relative group">
          {% if event.image %}
            <img src="{{ event.image.url }}" alt="{{ event.title }}" class="w-full h-[420px] object-cover" />
          {% else %}
            <img src="{% static 'images/default_club.png' %}" alt="Default image" class="w-full h-[420px] object-cover" />
          {% endif %}

          <!-- Title overlay -->
          <div class="absolute bottom-0 left-0 right-0 bg-black/40 text-white text-lg font-semibold p-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
            {{ event.title }}
          </div>
        </a>
      {% empty %}
        <img src="{% static 'images/default_club.png' %}" alt="No events" class="w-full h-[420px] object-cover flex-shrink-0" />
      {% endfor %}
    </div>

    <!-- Dots -->
    <div class="absolute bottom-3 left-0 right-0 flex justify-center space-x-2 z-10">
      {% for event in events %}
        <button class="dot w-3 h-3 bg-white/60 rounded-full"></button>
      {% endfor %}
    </div>
  </div>

  <!-- Divider line -->
  <div class="absolute top-1/2 left-0 w-full h-1 bg-gray-300 -z-10"></div>
</div>

<script>
  const carousel = document.querySelector('#carousel .carousel-images');
  const dots = document.querySelectorAll('.dot');
  const total = carousel.children.length;
  let index = 0;

  function showSlide(i) {
    carousel.style.transform = `translateX(-${i * 100}%)`;
    dots.forEach((dot, j) => {
      dot.classList.toggle('bg-white', j !== i);
      dot.classList.toggle('bg-blue-500', j === i);
    });
  }

  function nextSlide() {
    index = (index + 1) % total;
    showSlide(index);
  }

  let interval = setInterval(nextSlide, 3000);
  showSlide(index);

  dots.forEach((dot, i) => {
    dot.addEventListener('click', () => {
      clearInterval(interval);
      index = i;
      showSlide(i);
      interval = setInterval(nextSlide, 3000);
    });
  });
</script>

{% endblock %}
